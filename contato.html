<head>
<meta charset="UTF-8">
<title>Contato</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com/"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* HEADER */
.linha-brilho {
  height: 2px;
  background: linear-gradient(to right, rgba(0,0,0,0.1), rgba(0,0,0,0.4), rgba(0,0,0,0.1));
}

/* STEPS */
.steps-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
}

.step {
  text-align: center;
  width: 100%;
  color: #9ca3af;
  position: relative;
  z-index: 2;
}

.step.active {
  color: #2563eb;
}

.circle {
  width: 56px;
  height: 56px;
  background: #e5e7eb;
  border-radius: 9999px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 8px;
  border: 4px solid white;
}

.step.active .circle {
  background: #2563eb;
  color: white;
}

.desktop-line {
  position: absolute;
  top: 28px;
  left: 0;
  width: 100%;
  height: 4px;
  z-index: 1;
}

/* CONTROLE MOBILE / DESKTOP */
.form-mobile { display: none; }
.form-desktop { display: block; }

@media (max-width: 600px) {

  .steps-container {
    flex-direction: column;
    gap: 25px;
  }

  .desktop-line {
    display: none;
  }

  .form-desktop {
    display: none;
  }

  .form-mobile {
    display: block;
    width: 100%;
  }

}
</style>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<header class="bg-white shadow-sm">

  <div class="max-w-5xl mx-auto flex justify-between items-center px-4 py-4">
    <img src="logo4.png" class="h-16">
    <button class="bg-blue-600 text-white px-4 py-2 text-sm rounded">SAIR</button>
  </div>

  <div class="linha-brilho"></div>

  <div class="flex justify-center py-4">
    <div class="bg-gray-100 px-10 py-3 text-sm text-gray-700 rounded text-center">
      SECRETARIA DE ESTADO DA ADMINISTRAÇÃO DO RIO GRANDE DO NORTE/RN
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3">
    <img src="logo5.png" class="h-12">
    <span><strong>Edital:</strong> 001/2026</span>
  </div>

</header>

<!-- STEPS -->
<div class="bg-white py-10 shadow-sm border-t">

  <div class="max-w-5xl mx-auto px-4">

    <h2 class="text-xl font-semibold mb-8">FORMULÁRIO DE INSCRIÇÃO</h2>

    <div class="steps-container">

      <div class="desktop-line bg-gray-300"></div>
      <div class="desktop-line bg-blue-600" style="width:25%"></div>

      <!-- STEP 1 -->
      <div class="step text-green-600">
        <div class="circle bg-green-600 text-white">
          <i data-lucide="check"></i>
        </div>
        <span>Dados pessoais</span>
      </div>

      <!-- STEP 2 (ATIVO) -->
      <div class="step active">
        <div class="circle">
          <i data-lucide="phone"></i>
        </div>
        <span>Contato</span>

        <!-- FORM MOBILE -->
        <div class="form-mobile mt-5">

          <form id="formMobileContato" class="space-y-4">

            <div>
              <label class="text-sm">Email *</label>
              <input id="emailMobile" type="email" class="w-full border p-2 rounded">
            </div>

            <div>
              <label class="text-sm">Confirme o Email *</label>
              <input id="confirmarEmailMobile" type="email" class="w-full border p-2 rounded">
              <span id="erroEmailMobile" class="text-red-500 text-xs hidden">
                Emails não coincidem
              </span>
            </div>

            <div>
              <label class="text-sm">Telefone *</label>
              <input id="telefoneMobile" class="w-full border p-2 rounded">
            </div>

            <div>
              <label class="text-sm">Celular *</label>
              <input id="celularMobile" class="w-full border p-2 rounded">
            </div>

            <button class="bg-blue-600 text-white py-3 rounded w-full">
              Próximo
            </button>

          </form>

        </div>
      </div>

      <!-- OUTROS -->
      <div class="step">
        <div class="circle"><i data-lucide="map-pin"></i></div>
        <span>Endereço</span>
      </div>

      <div class="step">
        <div class="circle"><i data-lucide="briefcase"></i></div>
        <span>Informações</span>
      </div>

      <div class="step">
        <div class="circle"><i data-lucide="check"></i></div>
        <span>Confirmação</span>
      </div>

    </div>
  </div>
</div>

<!-- FORM DESKTOP -->
<div class="form-desktop bg-white shadow mt-6">
  <div class="max-w-4xl mx-auto p-8">

    <form id="formContato" class="space-y-4">

      <input id="email" type="email" class="w-full border p-3 rounded" placeholder="Email *">

      <input id="confirmarEmail" type="email" class="w-full border p-3 rounded" placeholder="Confirmar Email *">
      <span id="erroEmail" class="text-red-500 text-xs hidden">Emails não coincidem</span>

      <input id="telefone" class="w-full border p-3 rounded" placeholder="Telefone *">

      <input id="celular" class="w-full border p-3 rounded" placeholder="Celular *">

      <div class="flex gap-3">
        <button type="button" onclick="voltar()" class="bg-gray-400 text-white px-6 py-3 rounded w-full">
          Voltar
        </button>

        <button class="bg-blue-600 text-white px-6 py-3 rounded w-full">
          Próximo
        </button>
      </div>

    </form>

  </div>
</div>

<!-- FOOTER -->
<footer class="text-center text-xs text-gray-500 mt-10 pb-6">
  <p>Todos os Direitos Reservados ® 2026</p>
</footer>

<script>
lucide.createIcons();

// máscara telefone
function maskTelefone(v) {
  v = v.replace(/\D/g, "");
  v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
  v = v.replace(/(\d{4,5})(\d{4})$/, "$1-$2");
  return v;
}

/* MOBILE */
const formMobile = document.getElementById("formMobileContato");

telefoneMobile.addEventListener("input", e => e.target.value = maskTelefone(e.target.value));
celularMobile.addEventListener("input", e => e.target.value = maskTelefone(e.target.value));

formMobile.addEventListener("submit", function(e){
  e.preventDefault();

  if(emailMobile.value !== confirmarEmailMobile.value){
    erroEmailMobile.classList.remove("hidden");
    return;
  }

  localStorage.setItem("emailCandidato", emailMobile.value);
  localStorage.setItem("telefoneCandidato", telefoneMobile.value);
  localStorage.setItem("celularCandidato", celularMobile.value);

  window.location.href = "endereco.html";
});

/* DESKTOP */
const form = document.getElementById("formContato");

telefone.addEventListener("input", e => e.target.value = maskTelefone(e.target.value));
celular.addEventListener("input", e => e.target.value = maskTelefone(e.target.value));

function voltar(){
  window.location.href = "dadospessoais.html";
}

form.addEventListener("submit", function(e){
  e.preventDefault();

  if(email.value !== confirmarEmail.value){
    erroEmail.classList.remove("hidden");
    return;
  }

  localStorage.setItem("emailCandidato", email.value);
  localStorage.setItem("telefoneCandidato", telefone.value);
  localStorage.setItem("celularCandidato", celular.value);

  window.location.href = "endereco.html";
});
</script>
