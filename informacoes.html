<script>
lucide.createIcons();

/* ATUALIZA CARGOS */
function atualizarCargo(valor){

  let html = `<option value="">Selecione o cargo</option>`;
  let mensagem = "";

  if (valor == "1") {
    html += `
      <option>301 - ASSISTENTE DE TRÂNSITO - ADMINISTRAÇÃO</option>
      <option>302 - ASSISTENTE DE TRÂNSITO - EDIFICAÇÕES</option>
      <option>303 - ASSISTENTE DE TRÂNSITO - ELETRICISTA PROGRAMADOR</option>
      <option>304 - ASSISTENTE DE TRÂNSITO - INSPEÇÃO VEICULAR</option>
      <option>305 - ASSISTENTE DE TRÂNSITO - AGENTE ADMINISTRATIVO PREVIDENCIÁRIO</option>
    `;
    mensagem = "🔵 Ao se inscrever você também concorre ao IPERN 305.";
  }

  if (valor == "2") {
    html += `
      <option>402 - ANALISTA DE TRÂNSITO - ADMINISTRAÇÃO</option>
      <option>403 - ANALISTA DE TRÂNSITO - BANCO DE DADOS</option>
      <option>404 - ANALISTA DE TRÂNSITO - REDES</option>
      <option>405 - ANALISTA DE TRÂNSITO - SISTEMAS</option>
      <option>406 - ANALISTA DE TRÂNSITO - ARQUITETURA</option>
      <option>407 - ANALISTA DE TRÂNSITO - CONTABILIDADE</option>
      <option>408 - ANALISTA DE TRÂNSITO - DIREITO</option>
      <option>409 - ANALISTA DE TRÂNSITO - ECONOMIA</option>
      <option>410 - ANALISTA DE TRÂNSITO - ENG. CIVIL</option>
      <option>411 - ANALISTA DE TRÂNSITO - ENG. ELÉTRICA</option>
      <option>412 - ANALISTA DE TRÂNSITO - ESTATÍSTICA</option>
      <option>413 - ANALISTA DE TRÂNSITO - PSICOLOGIA</option>
      <option>414 - ANALISTA DE TRÂNSITO - PEDAGOGIA</option>
    `;
    mensagem = "🔵 Você concorre a múltiplos cargos vinculados.";
  }

  if (valor == "3") {
    html += `<option>415/401 - ASS. TÉC. PREV. / TÉC. EM ABAST.</option>`;
    mensagem = "🔵 Concorrência conjunta IPERN + CEASA.";
  }

  cargo.innerHTML = html;
  cargoMobile.innerHTML = html;

  mensagemBox.innerHTML = mensagem;
  mensagemBox.classList.remove("hidden");

  msgMobile.innerHTML = mensagem;
  msgMobile.classList.remove("hidden");
}

/* EVENTOS */
bloco.addEventListener("change", ()=>{
  blocoMobile.value = bloco.value;
  atualizarCargo(bloco.value);
});

blocoMobile.addEventListener("change", ()=>{
  bloco.value = blocoMobile.value;
  atualizarCargo(blocoMobile.value);
});

cargo.addEventListener("change", ()=>{
  cargoMobile.value = cargo.value;
});

cargoMobile.addEventListener("change", ()=>{
  cargo.value = cargoMobile.value;
});

/* 🔥 SALVAR DADOS CORRETAMENTE */
function salvarDados(blocoVal, cargoVal){

  localStorage.setItem("bloco", blocoVal);
  localStorage.setItem("cargo", cargoVal);

}

/* SUBMIT DESKTOP */
formInfo.addEventListener("submit", e=>{
  e.preventDefault();

  if(!bloco.value || !cargo.value){
    alert("Selecione bloco e cargo");
    return;
  }

  salvarDados(bloco.value, cargo.value);

  window.location.href = "confirmacao.html";
});

/* SUBMIT MOBILE */
formInfo.addEventListener("submit", e=>{
  e.preventDefault();

  localStorage.setItem("bloco", bloco.value);
  localStorage.setItem("cargo", cargo.value);

  window.location.href = "confirmacao.html";
});

formMobileInfo.addEventListener("submit", e=>{
  e.preventDefault();

  localStorage.setItem("bloco", blocoMobile.value);
  localStorage.setItem("cargo", cargoMobile.value);

  window.location.href = "confirmacao.html";
});
</script>
